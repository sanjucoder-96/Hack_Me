<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>graphGST — Knowledge Graph Reconciliation v4</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="assets/app.css"/>
</head>
<body>

<!-- SPLASH SCREEN -->
<div id="splash">
  <canvas id="splash-canvas"></canvas>
  <div class="splash-content">
    <div class="splash-nodes-row" id="splash-nodes">
      <div class="snode" style="--c:#3b82f6">🏢</div>
      <div class="snode-line"></div>
      <div class="snode" style="--c:#06b6d4">📄</div>
      <div class="snode-line"></div>
      <div class="snode" style="--c:#22c55e">📋</div>
      <div class="snode-line"></div>
      <div class="snode" style="--c:#a78bfa">💳</div>
      <div class="snode-line"></div>
      <div class="snode" style="--c:#f59e0b">✅</div>
      <div class="snode-line"></div>
      <div class="snode" style="--c:#ec4899">🤖</div>
    </div>
    <h1 class="splash-title">graph<span>GST</span></h1>
    <p class="splash-sub">Knowledge Graph · ITC Reconciliation · Fraud Detection · GraphRAG Audit Copilot</p>
    <div class="splash-progress-wrap">
      <div class="splash-bar"><div class="splash-fill" id="splashFill"></div></div>
      <div class="splash-status" id="splashStatus">Initializing graph engine...</div>
    </div>
    <div class="splash-tech">
      <span class="tech-pill">Neo4j Aura</span>
      <span class="tech-pill">NetworkX</span>
      <span class="tech-pill">FastAPI</span>
      <span class="tech-pill">XAI Audit</span>
      <span class="tech-pill">GraphRAG</span>
    </div>
  </div>
</div>

<!-- APP SHELL -->
<div id="app" class="app-hidden">
  <aside id="sidebar"></aside>
  <div class="main-wrap">
    <header id="topbar"></header>
    <main id="page" class="page-area"></main>
  </div>
</div>

<div id="toasts"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.30.2/cytoscape.min.js"></script>
<script src="assets/core.js"></script>
<script src="pages/dashboard.js"></script>
<script src="pages/graph.js"></script>
<script src="pages/reconcile.js"></script>
<script src="pages/fraud.js"></script>
<script src="pages/vendors.js"></script>
<script src="pages/audit.js"></script>
<script src="pages/invoices.js"></script>
<script src="pages/add.js"></script>
<script src="pages/agent.js"></script>
<script>boot();</script>
</body>
</html>
